name: Publish changed modules

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      scope:
        description: Publish changed modules from the latest change-set or all modules
        required: true
        default: changed
        type: choice
        options:
          - changed
          - all
      validate_only:
        description: Validate workflow logic without pushing tags/releases or notifying Foundry
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_modules: ${{ steps.detect.outputs.has_modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect modules to publish
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          mode="changed"
          before_sha=""
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            mode="${{ inputs.scope }}"
          fi

          changed_file_list="$CHANGED_FILE_LIST"
          : > "$changed_file_list"

          if [ "$mode" = "all" ]; then
            : > "$changed_file_list"
          else
            before_sha="${{ github.event.before }}"

            if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
              if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
                before_sha="$(git rev-parse HEAD^)"
              else
                before_sha=""
              fi
            fi

            if [ -n "$before_sha" ]; then
              git diff --name-only "$before_sha" "$GITHUB_SHA" > "$changed_file_list"
            else
              git ls-tree -r --name-only "$GITHUB_SHA" > "$changed_file_list"
            fi
          fi

          export BASE_SHA="$before_sha"

          detect_json="$(python - <<'PY'
          import glob
          import json
          import os
          import re
          import subprocess

          mode = os.environ["MODE"]
          changed_file_list = os.environ["CHANGED_FILE_LIST"]
          base_sha = os.environ.get("BASE_SHA", "").strip()

          def manifest_version_at(revision, manifest_path):
            if not revision:
              return None

            result = subprocess.run(
              ["git", "show", f"{revision}:{manifest_path}"],
              capture_output=True,
              text=True,
            )
            if result.returncode != 0:
              return None

            try:
              data = json.loads(result.stdout)
            except Exception:
              return None

            version = str(data.get("version", "")).strip()
            return version or None

          changed_files = None
          if mode != "all":
            with open(changed_file_list, encoding="utf-8") as handle:
              changed_files = set(line.strip() for line in handle if line.strip())

          modules = []
          for manifest in sorted(glob.glob("*/module.json")):
            module_dir = manifest.split("/")[0]

            if changed_files is not None:
              prefix = f"{module_dir}/"
              module_changed_paths = [path for path in changed_files if path.startswith(prefix)]
              if not module_changed_paths:
                continue

              release_relevant_paths = [
                path
                for path in module_changed_paths
                if not (
                  re.fullmatch(fr"{re.escape(module_dir)}/(?:README\.md|CHANGELOG\.md)", path, flags=re.IGNORECASE)
                  or path.startswith(f"{module_dir}/docs/")
                )
              ]

              if not release_relevant_paths:
                continue

            with open(manifest, encoding="utf-8") as handle:
              data = json.load(handle)

            module_id = str(data.get("id", "")).strip()
            version_raw = str(data.get("version", "")).strip()

            if not module_id or not version_raw:
              raise SystemExit(f"Invalid module manifest: {manifest} (id/version required)")

            if changed_files is not None and mode == "changed":
              base_version = manifest_version_at(base_sha, manifest)
              if base_version == version_raw:
                continue

            tag_version = version_raw if version_raw.startswith("v") else f"v{version_raw}"
            modules.append({
              "module_dir": module_dir,
              "module_id": module_id,
              "version": version_raw,
              "tag": f"{module_dir}/{tag_version}"
            })

          print(json.dumps(modules, separators=(",", ":")))
          PY
          )"

          has_modules="false"
          if [ "$detect_json" != "[]" ]; then
            has_modules="true"
          fi

          echo "matrix={\"include\":$detect_json}" >> "$GITHUB_OUTPUT"
          echo "has_modules=$has_modules" >> "$GITHUB_OUTPUT"
        env:
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.scope || 'changed' }}
          CHANGED_FILE_LIST: ${{ runner.temp }}/changed-files.txt

  publish:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_modules == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    concurrency:
      group: publish-modules-latest
      cancel-in-progress: false
    steps:
      - name: Detect App credentials
        id: app_creds
        shell: bash
        env:
          APP_ID: ${{ secrets.RELEASE_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${APP_ID:-}" ] && [ -n "${APP_PRIVATE_KEY:-}" ]; then
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App installation token
        id: app_token
        if: steps.app_creds.outputs.has_credentials == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Resolve repository auth token
        id: repo_auth
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app_token.outputs.token }}
          DEFAULT_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -n "${APP_TOKEN:-}" ]; then
            echo "token=${APP_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "using_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "token=${DEFAULT_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "using_app=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.repo_auth.outputs.token }}

      - name: Validate module manifest
        shell: bash
        run: |
          set -euo pipefail
          python -m json.tool "${{ matrix.module_dir }}/module.json" > /dev/null

      - name: Create module tag (record-keeping)
        id: create_tag
        shell: bash
        env:
          PUBLISH_SCOPE: ${{ github.event_name == 'workflow_dispatch' && inputs.scope || 'changed' }}
          VALIDATE_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.validate_only || false }}
        run: |
          set -euo pipefail
          tag="${{ matrix.tag }}"

          if [ "$VALIDATE_ONLY" = "true" ]; then
            echo "validate_only=true: skipping tag creation."
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "$tag")"
            if [ "$tag_sha" != "$GITHUB_SHA" ]; then
              if [ "$PUBLISH_SCOPE" = "all" ]; then
                echo "Tag '$tag' already exists at $tag_sha (scope=all; skipping integrity check, tag stays put)."
                echo "tag_created=false" >> "$GITHUB_OUTPUT"
              else
                echo "Tag '$tag' already exists and points to a different commit ($tag_sha)."
                echo "Refusing to publish to preserve release audit integrity."
                exit 1
              fi
            else
              echo "Tag '$tag' already exists for this commit. Continuing idempotent publish."
              echo "tag_created=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "$tag" "$GITHUB_SHA"
          git push origin "$tag"
          echo "tag_created=true" >> "$GITHUB_OUTPUT"

      - name: Package module assets
        id: package
        shell: bash
        run: |
          set -euo pipefail
          module_dir="${{ matrix.module_dir }}"
          module_id="${{ matrix.module_id }}"

          mkdir -p dist
          cp "$module_dir/module.json" "dist/${module_id}-module.json"

          python - <<'PY'
          import html as html_lib
          import json
          import re
          import urllib.request

          module_dir = "${{ matrix.module_dir }}"
          module_id = "${{ matrix.module_id }}"

          with open(f"{module_dir}/module.json", encoding="utf-8") as handle:
            manifest = json.load(handle)

          verified = str(manifest.get("compatibility", {}).get("verified", "")).strip()
          if not verified or "." not in verified:
            raise SystemExit(f"Missing or invalid compatibility.verified in {module_dir}/module.json")

          request = urllib.request.Request(
            "https://foundryvtt.com/releases/",
            headers={"User-Agent": "Mozilla/5.0 (compatible; FoundryVTT-BadgeBot/1.0)"}
          )
          with urllib.request.urlopen(request, timeout=20) as response:
            releases_html = response.read().decode("utf-8", errors="ignore")

          plain_text = re.sub(r"(?is)<script.*?>.*?</script>", " ", releases_html)
          plain_text = re.sub(r"(?is)<style.*?>.*?</style>", " ", plain_text)
          plain_text = re.sub(r"<[^>]+>", " ", plain_text)
          plain_text = html_lib.unescape(plain_text)
          plain_text = re.sub(r"\s+", " ", plain_text).strip()

          stable_versions = []
          release_matches = list(re.finditer(r"Release\s+(\d+\.\d+)", plain_text, re.IGNORECASE))
          for index, match in enumerate(release_matches):
            version = match.group(1)
            section_end = release_matches[index + 1].start() if index + 1 < len(release_matches) else len(plain_text)
            section_text = plain_text[match.start():section_end]
            if not re.search(r"\b(?:Update|Full)\s+Stable\b", section_text, re.IGNORECASE):
              continue

            major_str, minor_str = version.split(".", 1)
            stable_versions.append((int(major_str), int(minor_str), version))

          verified_major_str, verified_minor_str = verified.split(".", 1)
          verified_major = int(verified_major_str)
          verified_minor = int(verified_minor_str)

          if not stable_versions:
            latest_major = verified_major
            latest_minor = verified_minor
            latest_stable = verified
            color = "yellow"
            print("Warning: Unable to parse stable releases from https://foundryvtt.com/releases/; defaulting badge color to yellow.")
          else:
            latest_major, latest_minor, latest_stable = max(stable_versions)

            if verified_major == latest_major and verified_minor == latest_minor:
              color = "#28A745"
            elif verified_major == latest_major:
              color = "yellow"
            else:
              color = "red"

          badge = {
            "schemaVersion": 1,
            "label": "Foundry verified",
            "labelColor": "#444D56",
            "message": verified,
            "color": color,
            "cacheSeconds": 3600
          }

          with open(f"dist/{module_id}-foundry-verified-badge.json", "w", encoding="utf-8") as handle:
            json.dump(badge, handle, separators=(",", ":"))

          print(f"Computed badge for {module_id}: verified={verified}, latest_stable={latest_stable}, color={color}")
          PY

          (
            cd "$module_dir"
            zip -r "../dist/${module_id}.zip" . \
              -x "*.DS_Store" \
              -x "*.git*" \
              -x "node_modules/*" \
              -x "tests/*" \
              -x "tools/*" \
              -x ".vscode/*" \
              -x ".copilot/*"
          )

          echo "module_id=${module_id}" >> "$GITHUB_OUTPUT"

      - name: Publish versioned release assets
        if: github.event_name != 'workflow_dispatch' || inputs.validate_only != true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag }}
          files: |
            dist/${{ steps.package.outputs.module_id }}-module.json
            dist/${{ steps.package.outputs.module_id }}-foundry-verified-badge.json
            dist/${{ steps.package.outputs.module_id }}.zip
          overwrite_files: true
          make_latest: false
          token: ${{ steps.repo_auth.outputs.token }}

      - name: Notify Foundry package release API
        if: steps.create_tag.outputs.tag_created == 'true' && (github.event_name != 'workflow_dispatch' || inputs.scope != 'all') && (github.event_name != 'workflow_dispatch' || inputs.validate_only != true)
        shell: bash
        env:
          FOUNDRY_RELEASE_TOKENS_JSON: ${{ secrets.FOUNDRY_RELEASE_TOKENS_JSON }}
          MODULE_ID: ${{ matrix.module_id }}
          MODULE_VERSION: ${{ matrix.version }}
          MODULE_TAG: ${{ matrix.tag }}
          REPO_NAME: ${{ github.repository }}
          MODULE_MANIFEST_PATH: ${{ matrix.module_dir }}/module.json
          PACKAGED_MODULE_ID: ${{ steps.package.outputs.module_id }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          tokens_raw = (os.environ.get("FOUNDRY_RELEASE_TOKENS_JSON") or "").strip()
          module_id = os.environ["MODULE_ID"]

          if not tokens_raw:
            print("Foundry release token map secret not configured; skipping Foundry API notification.")
            raise SystemExit(0)

          try:
            token_map = json.loads(tokens_raw)
          except Exception as error:
            raise SystemExit(f"Invalid FOUNDRY_RELEASE_TOKENS_JSON secret format: {error}")

          token = (token_map.get(module_id) or "").strip()
          if not token:
            print(f"No Foundry release token configured for module '{module_id}'; skipping notification.")
            raise SystemExit(0)

          if not token.startswith("fvttp_"):
            raise SystemExit("Foundry release token must include 'fvttp_' prefix.")

          manifest_path = os.environ["MODULE_MANIFEST_PATH"]
          with open(manifest_path, encoding="utf-8") as handle:
            manifest_data = json.load(handle)

          compatibility = manifest_data.get("compatibility") or {}
          minimum = str(compatibility.get("minimum", "")).strip()
          verified = str(compatibility.get("verified", "")).strip()
          maximum = str(compatibility.get("maximum", "")).strip()

          if not minimum or not verified:
            raise SystemExit("Manifest compatibility.minimum and compatibility.verified are required for Foundry release API.")

          repository = os.environ["REPO_NAME"]
          module_tag = os.environ["MODULE_TAG"]
          packaged_module_id = os.environ["PACKAGED_MODULE_ID"]

          release_manifest_url = f"https://github.com/{repository}/releases/download/{module_tag}/{packaged_module_id}-module.json"
          release_notes_url = f"https://github.com/{repository}/releases/tag/{module_tag}"

          payload = {
            "id": module_id,
            "release": {
              "version": os.environ["MODULE_VERSION"],
              "manifest": release_manifest_url,
              "notes": release_notes_url,
              "compatibility": {
                "minimum": minimum,
                "verified": verified,
                "maximum": maximum
              }
            }
          }

          api_url = "https://foundryvtt.com/_api/packages/release_version/"
          payload_bytes = json.dumps(payload).encode("utf-8")
          max_attempts = 4
          backoff_seconds = [2, 5, 10]

          for attempt in range(1, max_attempts + 1):
            request = urllib.request.Request(
              api_url,
              data=payload_bytes,
              method="POST",
              headers={
                "Content-Type": "application/json",
                "Authorization": token,
                "User-Agent": "FoundryVTT-Release-Automation/1.0"
              }
            )

            try:
              with urllib.request.urlopen(request, timeout=30) as response:
                response_text = response.read().decode("utf-8", errors="replace")
                print(f"Foundry release API response ({response.status}) on attempt {attempt}: {response_text}")
                break
            except urllib.error.HTTPError as error:
              details = error.read().decode("utf-8", errors="replace")
              is_transient = error.code == 429 or 500 <= error.code < 600

              if not is_transient:
                raise SystemExit(f"Foundry release API request failed ({error.code}): {details}")

              if attempt >= max_attempts:
                raise SystemExit(
                  f"Foundry release API request failed after {max_attempts} attempts "
                  f"with transient HTTP error ({error.code}): {details}"
                )

              wait_time = backoff_seconds[min(attempt - 1, len(backoff_seconds) - 1)]
              print(
                f"Transient Foundry API HTTP error ({error.code}) on attempt {attempt}/{max_attempts}. "
                f"Retrying in {wait_time}s..."
              )
              time.sleep(wait_time)
            except urllib.error.URLError as error:
              if attempt >= max_attempts:
                raise SystemExit(
                  f"Foundry release API request failed after {max_attempts} attempts "
                  f"with network error: {error}"
                )

              wait_time = backoff_seconds[min(attempt - 1, len(backoff_seconds) - 1)]
              print(
                f"Transient Foundry API network error on attempt {attempt}/{max_attempts}: {error}. "
                f"Retrying in {wait_time}s..."
              )
              time.sleep(wait_time)
          PY

      - name: Move modules-latest tag to current commit
        if: github.event_name != 'workflow_dispatch' || inputs.validate_only != true
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f modules-latest "$GITHUB_SHA"
          git push --force origin refs/tags/modules-latest

      - name: Update rolling latest module assets
        if: github.event_name != 'workflow_dispatch' || inputs.validate_only != true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: modules-latest
          name: Latest Module Assets
          files: |
            dist/${{ steps.package.outputs.module_id }}-module.json
            dist/${{ steps.package.outputs.module_id }}-foundry-verified-badge.json
            dist/${{ steps.package.outputs.module_id }}.zip
          overwrite_files: true
          make_latest: true
          token: ${{ steps.repo_auth.outputs.token }}

  no-changes:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_modules != 'true'
    steps:
      - name: No changed modules
        run: echo "No module folder changes detected; nothing to publish."

  sync-badges:
    runs-on: ubuntu-latest
    needs: [detect, publish]
    if: needs.detect.outputs.has_modules == 'true'
    steps:
      - name: Detect App credentials
        id: app_creds
        shell: bash
        env:
          APP_ID: ${{ secrets.RELEASE_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${APP_ID:-}" ] && [ -n "${APP_PRIVATE_KEY:-}" ]; then
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App installation token
        id: app_token
        if: steps.app_creds.outputs.has_credentials == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Resolve repository auth token
        id: repo_auth
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app_token.outputs.token }}
          DEFAULT_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -n "${APP_TOKEN:-}" ]; then
            echo "token=${APP_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "using_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "token=${DEFAULT_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "using_app=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.repo_auth.outputs.token }}

      - name: Regenerate Foundry verified badge files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import glob
          import html as html_lib
          import json
          import re
          import urllib.request

          request = urllib.request.Request(
            "https://foundryvtt.com/releases/",
            headers={"User-Agent": "Mozilla/5.0 (compatible; FoundryVTT-BadgeBot/1.0)"}
          )
          with urllib.request.urlopen(request, timeout=20) as response:
            releases_html = response.read().decode("utf-8", errors="ignore")

          plain_text = re.sub(r"(?is)<script.*?>.*?</script>", " ", releases_html)
          plain_text = re.sub(r"(?is)<style.*?>.*?</style>", " ", plain_text)
          plain_text = re.sub(r"<[^>]+>", " ", plain_text)
          plain_text = html_lib.unescape(plain_text)
          plain_text = re.sub(r"\s+", " ", plain_text).strip()

          stable_versions = []
          release_matches = list(re.finditer(r"Release\s+(\d+\.\d+)", plain_text, re.IGNORECASE))
          for index, match in enumerate(release_matches):
            version = match.group(1)
            section_end = release_matches[index + 1].start() if index + 1 < len(release_matches) else len(plain_text)
            section_text = plain_text[match.start():section_end]
            if not re.search(r"\b(?:Update|Full)\s+Stable\b", section_text, re.IGNORECASE):
              continue
            major_str, minor_str = version.split(".", 1)
            stable_versions.append((int(major_str), int(minor_str), version))

          os_path = ".github/badges"
          import os
          os.makedirs(os_path, exist_ok=True)

          for manifest_path in sorted(glob.glob("*/module.json")):
            module_dir = manifest_path.split("/")[0]
            with open(manifest_path, encoding="utf-8") as handle:
              manifest = json.load(handle)

            module_id = str(manifest.get("id", "")).strip()
            verified = str(manifest.get("compatibility", {}).get("verified", "")).strip()
            if not module_id or not verified or "." not in verified:
              continue

            verified_major_str, verified_minor_str = verified.split(".", 1)
            verified_major = int(verified_major_str)
            verified_minor = int(verified_minor_str)

            if not stable_versions:
              latest_stable = verified
              color = "yellow"
            else:
              latest_major, latest_minor, latest_stable = max(stable_versions)
              if verified_major == latest_major and verified_minor == latest_minor:
                color = "#28A745"
              elif verified_major == latest_major:
                color = "yellow"
              else:
                color = "red"

            badge = {
              "schemaVersion": 1,
              "label": "Foundry verified",
              "labelColor": "#444D56",
              "message": verified,
              "color": color,
              "cacheSeconds": 3600
            }

            out_path = f".github/badges/{module_id}-foundry-verified-badge.json"
            with open(out_path, "w", encoding="utf-8") as handle:
              json.dump(badge, handle, separators=(",", ":"))

            print(f"Synced {out_path}: verified={verified}, latest_stable={latest_stable}, color={color}")
          PY

      - name: Commit badge file updates
        if: github.event_name != 'workflow_dispatch' || inputs.validate_only != true
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/badges; then
            echo "No badge file changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges
          git commit -m "Update Foundry verified badge files [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
